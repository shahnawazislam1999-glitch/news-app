<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Secure Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .admin-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="password"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; height: 150px; }
        button { width: 100%; padding: 12px; background-color: black; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        button:hover { background-color: #333; }
        #logout-btn { background-color: red; margin-top: 20px; }
        #logout-btn:hover { background-color: darkred; }
        #status-msg, #login-error { text-align: center; margin-top: 15px; font-weight: bold; }
        
        /* Hide the posting form initially */
        #post-section { display: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        
        <div id="login-section">
            <h2>Admin Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="admin-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit">Log In</button>
                <div id="login-error" style="color: red;"></div>
            </form>
        </div>

        <div id="post-section">
            <h2>Add New Post</h2>
            <p style="text-align: center; font-size: 12px; color: green;">Logged in successfully. You can now post.</p>
            
            <form id="add-post-form">
                <div class="form-group">
                    <label for="post-title">Job/News Title</label>
                    <input type="text" id="post-title" required placeholder="e.g., Assam Police Constable Recruitment">
                </div>

                <div class="form-group">
                    <label for="post-category">Category</label>
                    <select id="post-category" required>
                        <option value="" disabled selected>Select a category...</option>
                        <option value="gov_job">GOV JOB</option>
                        <option value="pvt_job">PVT JOB</option>
                        <option value="wfh">WORK FROM HOME</option>
                        <option value="admit_card">ADMIT CARD</option>
                        <option value="news">JOB RELATED NEWS</option>
                        <option value="books">IMPORTANT BOOKS</option>
                        <option value="trending">TRENDING JOB</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="post-content">Description / Content (HTML allowed)</label>
                    <textarea id="post-content" required placeholder="Enter the job details, links, or news text here..."></textarea>
                </div>

                <button type="submit">Publish Post</button>
                <div id="status-msg"></div>
            </form>

            <button id="logout-btn">Log Out</button>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        // Your Corrected Firebase Configuration
        const firebaseConfig = {
  apiKey: "AIzaSyCToPB-kbQgfr-QEB_zelN-8NjYDIfcfQw",
  authDomain: "news-app-67878.firebaseapp.com",
  projectId: "news-app-67878",
  storageBucket: "news-app-67878.firebasestorage.app",
  messagingSenderId: "289992061814",
  appId: "1:289992061814:web:bfb6a93d4082f5b6354057"
};


        

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const postSection = document.getElementById('post-section');
        const loginError = document.getElementById('login-error');
        const statusMsg = document.getElementById('status-msg');

        // 1. Listen for Authentication State Changes
        auth.onAuthStateChanged((user) => {
            if (user) {
                // User is logged in, show the post form
                loginSection.style.display = 'none';
                postSection.style.display = 'block';
                // Remove the centering so the form looks normal
                document.body.style.alignItems = 'flex-start';
            } else {
                // User is logged out, show login screen
                loginSection.style.display = 'block';
                postSection.style.display = 'none';
                document.body.style.alignItems = 'center';
            }
        });

        // 2. Handle Login Form Submission
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    loginError.innerText = ""; // Clear errors
                })
                .catch((error) => {
                    loginError.innerText = "Invalid email or password.";
                    console.error(error);
                });
        });

        // 3. Handle Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut();
        });

        // 4. Handle Post Form Submission
        document.getElementById('add-post-form').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const content = document.getElementById('post-content').value;

            statusMsg.style.color = "blue";
            statusMsg.innerText = "Publishing...";

            db.collection("posts").add({
                title: title,
                category: category,
                content: content,
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            })
            .then(() => {
                statusMsg.style.color = "green";
                statusMsg.innerText = "Post published successfully!";
                document.getElementById('add-post-form').reset(); 
                setTimeout(() => { statusMsg.innerText = ""; }, 3000);
            })
            .catch((error) => {
                console.error("Error adding document: ", error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Error: Could not publish. Check permissions.";
            });
        });
    </script>
</body>
</html>
