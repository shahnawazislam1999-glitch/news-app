<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Job Portal</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f4;
        }

        /* Header */
        header {
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            letter-spacing: 2px;
            position: relative;
        }

        /* Main Content Grid */
        main {
            display: grid;
            gap: 15px;
            padding: 20px;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Individual Columns */
        .column {
            background-color: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .column h2 {
            text-align: center;
            font-size: 16px;
            padding: 15px 0;
            border-bottom: 2px solid black;
            text-transform: uppercase;
        }

        /* Scrollable List inside Columns */
        .scrollable-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Custom Scrollbar */
        .scrollable-list::-webkit-scrollbar {
            width: 5px;
        }
        .scrollable-list::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 5px;
        }

        .list-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bullet {
            margin-right: 8px;
            font-size: 18px;
            line-height: 1;
        }

        .headline {
            flex-grow: 1;
        }

        /* Buttons */
        .know-more-btn {
            background: none;
            border: none;
            color: blue;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
            white-space: nowrap;
        }

        .save-fav-btn {
            background: none;
            border: none;
            color: red;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
            white-space: nowrap;
        }

        .remove-fav-btn {
            background: red;
            color: white;
            border: none;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        /* Pagination Styles */
        .pagination {
            display: flex;
            justify-content: center;
            padding: 10px 20px;
            gap: 10px;
            background-color: #f4f4f4;
        }
        
        .page-btn {
            padding: 8px 16px;
            border: 2px solid black;
            background-color: white;
            color: black;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        
        .page-btn:hover {
            background-color: #ddd;
        }
        
        .page-btn.active {
            background-color: black;
            color: white;
        }

        /* Footer */
        footer {
            background-color: black;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            font-size: 14px;
        }

        /* --- POPUP / MODAL STYLES --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            background-color: #f9f9f9;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .close-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            line-height: 1.6;
        }

       /* --- Responsive design for smaller screens --- */
        @media (max-width: 1024px) {
            body {
                height: auto; 
            }
            main { 
                overflow: visible; 
            }
            .column { 
                height: 400px; 
            }
        }

        @media (max-width: 768px) {
            main { 
                gap: 25px; 
                padding: 20px 0px 20px 20px; 
                border-right: 70px solid transparent;
            }
            .column {
                height: 350px; 
            }
            .scrollable-list {
                overscroll-behavior: contain; 
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="images/homelogo.png" id="home-logo" alt="Home Logo" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); height: 40px; cursor: pointer;">
        
        <img src="images/search.png" id="search-logo" alt="Search Logo" style="position: absolute; left: 70px; top: 50%; transform: translateY(-50%); height: 35px; cursor: pointer;">
        
        ASSAM JOBS

	<img src="images/favourite.png" id="fav-logo" alt="Favorite Logo" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); height: 40px; cursor: pointer;">

        <img src="images/shortcut.png" id="shortcut-logo" alt="Shortcut Logo" style="position: absolute; right:60px; top: 50%; transform: translateY(-50%); height: 35px; cursor: pointer;">
    </header>

    <main id="main-grid">
        <div class="column">
            <h2>GOV JOB</h2>
            <div class="scrollable-list" id="gov-job-list"></div>
        </div>

        <div class="column">
            <h2>PVT JOB</h2>
            <div class="scrollable-list" id="pvt-job-list"></div>
        </div>

        <div class="column">
            <h2>WORK FROM HOME</h2>
            <div class="scrollable-list" id="wfh-list"></div>
        </div>

        <div class="column">
            <h2>ADMIT CARD (FOR GOVT. JOB)</h2>
            <div class="scrollable-list" id="admit-card-list"></div>
        </div>

        <div class="column">
            <h2>JOB RELATED NEWS</h2>
            <div class="scrollable-list" id="news-list"></div>
        </div>
        
	    <div class="column">
            <h2>IMPORTANT BOOKS</h2>
            <div class="scrollable-list" id="books-list"></div>
        </div>

	    <div class="column">
            <h2>TRENDING JOB</h2>
            <div class="scrollable-list" id="trending-news"></div>
        </div>
    </main>

    <div class="pagination" id="pagination-controls"></div>

    <footer>
        <div id="about-us-btn" style="cursor: pointer;">ABOUT US</div>
        <div id="contact-btn" style="cursor: pointer;">CONT. NO</div>
    </footer>

    <div class="modal-overlay" id="articleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Loading Title...</h3>
                <button class="close-btn" id="closeModalBtn">X Close</button>
            </div>
            <div class="modal-body" id="modalBody">
                Loading content...
            </div>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCToPB-kbQgfr-QEB_zeLN-8NjYDIfcQw",
        authDomain: "news-app-67878.firebaseapp.com",
        projectId: "news-app-67878",
        storageBucket: "news-app-67878.firebasestorage.app",
        messagingSenderId: "289992061814",
        appId: "1:289992061814:web:bf6a93d4082f5b6354057"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    console.log("Firebase connected", db);

    /* --- DATE FORMATTING LOGIC --- */
    function formatFirebaseDate(firebaseTimestamp) {
        if (!firebaseTimestamp) return ''; 
        
        const date = firebaseTimestamp.toDate(); 
        
        const day = date.getDate();
        const suffix = (day % 10 === 1 && day !== 11) ? 'st' :
                       (day % 10 === 2 && day !== 12) ? 'nd' :
                       (day % 10 === 3 && day !== 13) ? 'rd' : 'th';
        
        const monthNames = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
        const month = monthNames[date.getMonth()];
        const year = date.getFullYear();
        
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 

        return ` ${day}${suffix} ${month} ${year} , ${hours}:${minutes} ${ampm} `;
    }

    /* --- FIREBASE DATA FETCHING --- */
    function fetchAndRenderList(category, elementId) {
        const container = document.getElementById(elementId);
        container.innerHTML = '<span style="padding:10px; font-size:12px;">Loading updates...</span>'; 

        db.collection('posts')
          .where('category', '==', category)
          .orderBy('createdAt', 'desc') 
          .get()
        .then((snapshot) => {
            container.innerHTML = ''; 
            
            if (snapshot.empty) {
                container.innerHTML = '<span style="padding:10px; font-size:12px;">No updates available.</span>';
                return;
            }

            snapshot.forEach((doc) => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = 'list-item';
                
                const titleText = item.title ? item.title : 'No Title';
                const contentHTML = item.content ? item.content : 'No Content';
                const dateText = item.createdAt ? `<span style="font-size: 11px; color: #666; margin-left: 5px;">${formatFirebaseDate(item.createdAt)}</span>` : '';

                div.innerHTML = `
                    <span class="bullet">•</span>
                    <span class="headline">${titleText}${dateText}
                        <button class="know-more-btn">[know more]</button>
                        <button class="save-fav-btn">[save to favourite]</button>
                    </span>
                `;
                
                const btn = div.querySelector('.know-more-btn');
                btn.addEventListener('click', () => {
                    openModal(titleText, contentHTML);
                });

                const favBtn = div.querySelector('.save-fav-btn');
                favBtn.addEventListener('click', () => {
                    let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];
                    const exists = favorites.some(fav => fav.title === titleText);
                    if (!exists) {
                        favorites.push({ title: titleText, content: contentHTML, date: dateText });
                        localStorage.setItem('myFavArticles', JSON.stringify(favorites));
                        favBtn.innerText = '[saved]';
                        favBtn.style.color = 'gray';
                    } else {
                        alert('This article is already in your favorites!');
                    }
                });

                container.appendChild(div);
            });
        })
        .catch((error) => {
            console.error("Error getting documents: ", error);
            if(error.message.includes("index")) {
                 console.warn("Please create the Firebase index by clicking the link in the console error to enable sorting.");
                 fallbackFetchAndRenderList(category, elementId);
            } else {
                 container.innerHTML = '<span style="color:red; padding:10px; font-size:12px;">Error loading data.</span>';
            }
        });
    }

    function fallbackFetchAndRenderList(category, elementId) {
        const container = document.getElementById(elementId);
        db.collection('posts').where('category', '==', category).get().then((snapshot) => {
            container.innerHTML = '';
            if (snapshot.empty) return;
            snapshot.forEach((doc) => {
                const item = doc.data();
                const div = document.createElement('div');
                div.className = 'list-item';
                
                const titleText = item.title || 'No Title';
                const contentHTML = item.content || 'No Content';
                const dateText = item.createdAt ? `<span style="font-size: 11px; color: #666; margin-left: 5px;">${formatFirebaseDate(item.createdAt)}</span>` : '';
                
                div.innerHTML = `
                    <span class="bullet">•</span>
                    <span class="headline">${titleText}${dateText}
                        <button class="know-more-btn">[know more]</button>
                        <button class="save-fav-btn">[save to favourite]</button>
                    </span>
                `;
                
                div.querySelector('.know-more-btn').addEventListener('click', () => openModal(titleText, contentHTML));
                
                const favBtn = div.querySelector('.save-fav-btn');
                favBtn.addEventListener('click', () => {
                    let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];
                    const exists = favorites.some(fav => fav.title === titleText);
                    if (!exists) {
                        favorites.push({ title: titleText, content: contentHTML, date: dateText });
                        localStorage.setItem('myFavArticles', JSON.stringify(favorites));
                        favBtn.innerText = '[saved]';
                        favBtn.style.color = 'gray';
                    } else {
                        alert('This article is already in your favorites!');
                    }
                });
                
                container.appendChild(div);
            });
        });
    }

    fetchAndRenderList('gov_job', 'gov-job-list');
    fetchAndRenderList('pvt_job', 'pvt-job-list');
    fetchAndRenderList('wfh', 'wfh-list');
    fetchAndRenderList('admit_card', 'admit-card-list');
    fetchAndRenderList('news', 'news-list');
	fetchAndRenderList('books', 'books-list');
	fetchAndRenderList('trending', 'trending-news');

    /* --- POPUP / MODAL LOGIC --- */
    const modal = document.getElementById('articleModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeBtn = document.getElementById('closeModalBtn');

    function openModal(title, content) {
        modalTitle.innerText = title;
        modalBody.innerHTML = content;
        modal.style.display = 'flex'; 
    }
    function closeModal() { modal.style.display = 'none'; }
    closeBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (event) => { if (event.target === modal) closeModal(); });

    /* --- PAGINATION LOGIC --- */
    const columns = document.querySelectorAll('.column');
    const paginationContainer = document.getElementById('pagination-controls');
    const mainGrid = document.getElementById('main-grid');
    let currentPage = 1;

    function getColumnsPerPage() {
        if (window.innerWidth > 1024) return 5; // Desktop
        if (window.innerWidth > 768) return 3;  // Tablet
        return 5;                               // Mobile (Displays 5 stacked vertically)
    }

    function renderPagination() {
        const colsPerPage = getColumnsPerPage();
        const totalPages = Math.ceil(columns.length / colsPerPage);

        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;

        let visibleCount = 0;

        columns.forEach((col, index) => {
            const start = (currentPage - 1) * colsPerPage;
            const end = start + colsPerPage;

            if (index >= start && index < end) {
                col.style.display = 'flex'; 
                visibleCount++;
            } else {
                col.style.display = 'none'; 
            }
        });

        if (window.innerWidth > 768) {
            mainGrid.style.gridTemplateColumns = `repeat(${visibleCount}, 1fr)`;
        } else {
            mainGrid.style.gridTemplateColumns = `1fr`;
        }

        paginationContainer.innerHTML = '';
        if (totalPages > 1) {
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => {
                    currentPage = i;
                    renderPagination(); 
                };
                paginationContainer.appendChild(btn);
            }
        }
    }

    window.addEventListener('resize', renderPagination);
    renderPagination();

    /* --- FOOTER BUTTONS LOGIC --- */
    const aboutUsBtn = document.getElementById('about-us-btn');
    const contactBtn = document.getElementById('contact-btn');

    aboutUsBtn.addEventListener('click', () => {
        const demoAboutText = `
            <h4>Welcome to the News & Job Portal!</h4>
            <br>
            <p>This is a demo text for the About Us section. We are dedicated to providing you with the latest updates on government jobs, private jobs, work-from-home opportunities, and trending news.</p>
            <br>
            <p>Our goal is to make job hunting easier and more accessible for everyone.</p>
        `;
        openModal("ABOUT US", demoAboutText);
    });

    contactBtn.addEventListener('click', () => {
        const demoContactText = `
            <h4>Contact Information</h4>
            <br>
            <p><strong>Phone:</strong> +91-9876543210 (Demo)</p>
            <p><strong>Email:</strong> support@demo-news-portal.com</p>
            <p><strong>Office Hours:</strong> Monday - Friday, 9:00 AM to 5:00 PM</p>
        `;
        openModal("CONTACT NUMBER", demoContactText);
    });

    /* --- LOGO CLICK LOGIC --- */
    const homeLogo = document.getElementById('home-logo');
    if (homeLogo) {
        homeLogo.addEventListener('click', () => {
            currentPage = 1;
            renderPagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    /* --- FAVORITES VIEW & DELETE LOGIC --- */
    const favLogo = document.getElementById('fav-logo');
    if (favLogo) {
        favLogo.addEventListener('click', openFavoritesModal);
    }

    function openFavoritesModal() {
        let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];

        if (favorites.length === 0) {
            openModal("YOUR FAVORITES", "<p>You haven't saved any articles yet.</p>");
            return;
        }

        let html = '<div>';
        favorites.forEach((fav, index) => {
            html += `
                <div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong>${fav.title}</strong> ${fav.date}
                        <br>
                        <button class="know-more-btn" style="margin-left:0; margin-top:5px;" onclick="viewFavContent(${index})">[read article]</button>
                    </div>
                    <button class="remove-fav-btn" onclick="removeFavorite(${index})">Delete</button>
                </div>
            `;
        });
        html += '</div>';

        openModal("YOUR FAVORITES", html);
    }

    window.removeFavorite = function(index) {
        let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];
        favorites.splice(index, 1); 
        localStorage.setItem('myFavArticles', JSON.stringify(favorites)); 
        openFavoritesModal(); 
    };

    window.viewFavContent = function(index) {
        let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];
        const fav = favorites[index];
        
        const backBtnHTML = `<br><br><hr><br><button onclick="openFavoritesModal()" style="padding: 5px 10px; cursor: pointer;">⬅ Back to Favorites</button>`;
        openModal(fav.title, fav.content + backBtnHTML);
    };



/* --- SHORTCUT MENU LOGIC --- */
    const shortcutLogo = document.getElementById('shortcut-logo');

    if (shortcutLogo) {
        shortcutLogo.addEventListener('click', openShortcutMenu);
    }

    function openShortcutMenu() {
        // Find all columns dynamically
        const allColumns = document.querySelectorAll('.column');
        
        let html = '<div style="display: flex; flex-direction: column; gap: 10px;">';

        // Loop through each column to get its H2 title and create a button
        allColumns.forEach((col, index) => {
            const categoryName = col.querySelector('h2').innerText;
            html += `
                <button onclick="scrollToCategory(${index})" 
                        style="padding: 12px; background: white; border: 2px solid black; cursor: pointer; text-align: left; font-weight: bold; font-size: 14px; transition: 0.2s;">
                    ${categoryName}
                </button>`;
        });

        html += '</div>';

        // Reuse your existing modal to show the list
        openModal("CATEGORY SHORTCUTS", html);
    }

    window.scrollToCategory = function(index) {
        // Calculate which page this category is on based on your pagination logic
        const colsPerPage = getColumnsPerPage();
        const targetPage = Math.floor(index / colsPerPage) + 1;

        // Change the page if the category is not on the current page
        if (currentPage !== targetPage) {
            currentPage = targetPage;
            renderPagination();
        }

        // Close the popup window
        closeModal();

        // Add a tiny delay to ensure the page renders before scrolling
        setTimeout(() => {
            const targetCol = document.querySelectorAll('.column')[index];
            // Subtracting some margin to account for the fixed header
            const yOffset = -80; 
            const y = targetCol.getBoundingClientRect().top + window.pageYOffset + yOffset;
            
            window.scrollTo({ top: y, behavior: 'smooth' });
            
            // Highlight the column briefly so the user sees what they clicked
            const originalBg = targetCol.style.backgroundColor;
            targetCol.style.backgroundColor = '#ffffcc';
            setTimeout(() => {
                targetCol.style.backgroundColor = originalBg;
            }, 1000);
        }, 50);
    };

    /* --- SEARCH LOGIC --- */
    const searchLogo = document.getElementById('search-logo');

    // 1. DEFINE THE FUNCTION FIRST
    window.openSearchModal = function() {
        const searchHTML = `
            <input type="text" id="searchInput" placeholder="Search articles by keyword..." autocomplete="off" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid black; border-radius: 4px; font-size: 14px;">
            <div id="searchResults" style="max-height: 400px; overflow-y: auto; padding-right: 5px;">
                <p style="font-size: 12px; color: #666; text-align: center; margin-top: 20px;">Start typing to search...</p>
            </div>
        `;
        
        // Reuse the existing openModal function
        openModal("SEARCH ARTICLES", searchHTML);

        // Attach listener to the input field so it searches dynamically as the user types
        const searchInput = document.getElementById('searchInput');
        
        // Small delay (debounce) to prevent making too many requests while typing fast
        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const searchTerm = e.target.value.toLowerCase().trim();
            searchTimeout = setTimeout(() => {
                performSearch(searchTerm);
            }, 300); // Waits 300ms after the user stops typing
        });
        
        // Focus the input field immediately when the modal opens
        setTimeout(() => searchInput.focus(), 100);
    }

    // 2. THEN ATTACH THE CLICK EVENT TO THE LOGO
    if (searchLogo) {
        searchLogo.addEventListener('click', window.openSearchModal);
    }

    // Function to search Firebase and render results
    function performSearch(term) {
        const resultsContainer = document.getElementById('searchResults');
        
        if (term.length < 2) {
            resultsContainer.innerHTML = '<p style="font-size: 12px; color: #666; text-align: center; margin-top: 20px;">Start typing to search (minimum 2 characters)...</p>';
            return;
        }

        resultsContainer.innerHTML = '<p style="font-size: 12px; color: black; text-align: center; margin-top: 20px;">Searching...</p>';

        // Fetch all posts to filter them client-side for substring matching
        db.collection('posts').get().then((snapshot) => {
            resultsContainer.innerHTML = '';
            let found = false;

            snapshot.forEach((doc) => {
                const item = doc.data();
                const titleText = item.title ? item.title : 'No Title';
                const contentHTML = item.content ? item.content : 'No Content';
                const dateText = item.createdAt ? `<span style="font-size: 11px; color: #666; margin-left: 5px;">${formatFirebaseDate(item.createdAt)}</span>` : '';

                // Case-insensitive check if the search term exists in the title or content
                if (titleText.toLowerCase().includes(term) || contentHTML.toLowerCase().includes(term)) {
                    found = true;
                    
                    const div = document.createElement('div');
                    div.style.cssText = "margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ddd; line-height: 1.4;";
                    
                    div.innerHTML = `
                        <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;">${titleText} ${dateText}</div>
                        <div>
                            <button class="know-more-btn" style="margin-left: 0;">[read article]</button>
                            <button class="save-fav-btn">[save to favourite]</button>
                        </div>
                    `;
                    
                    // Attach event to read the article and return back to search
                    div.querySelector('.know-more-btn').addEventListener('click', () => {
                        const backBtnHTML = '<br><br><hr style="border: 1px solid #ddd;"><br><button onclick="openSearchModal()" style="padding: 8px 12px; cursor: pointer; background: black; color: white; border: none; border-radius: 4px; font-weight: bold;">⬅ Back to Search</button>';
                        openModal(titleText, contentHTML + backBtnHTML);
                    });

                    // Attach event to save to favorites
                    const favBtn = div.querySelector('.save-fav-btn');
                    favBtn.addEventListener('click', () => {
                        let favorites = JSON.parse(localStorage.getItem('myFavArticles')) || [];
                        const exists = favorites.some(fav => fav.title === titleText);
                        
                        if (!exists) {
                            favorites.push({ title: titleText, content: contentHTML, date: dateText });
                            localStorage.setItem('myFavArticles', JSON.stringify(favorites));
                            favBtn.innerText = '[saved]';
                            favBtn.style.color = 'gray';
                        } else {
                            alert('This article is already in your favorites!');
                        }
                    });

                    resultsContainer.appendChild(div);
                }
            });

            if (!found) {
                resultsContainer.innerHTML = '<p style="font-size: 12px; color: red; text-align: center; margin-top: 20px;">No articles found matching your search.</p>';
            }
        }).catch(error => {
            console.error("Search error:", error);
            resultsContainer.innerHTML = '<p style="font-size: 12px; color: red; text-align: center; margin-top: 20px;">Error performing search. Please try again.</p>';
        });
    }

</script>
</body>
</html>
